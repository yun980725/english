<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文字彙字根記憶法</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Lora:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --purple-50: #EEEDFE; --purple-200: #AFA9EC; --purple-400: #7F77DD;
  --purple-600: #534AB7; --purple-800: #3C3489; --purple-900: #26215C;
  --teal-50: #E1F5EE; --teal-200: #5DCAA5; --teal-600: #0F6E56; --teal-800: #085041;
  --coral-50: #FAECE7; --coral-200: #F0997B; --coral-600: #993C1D; --coral-800: #711B0C;
  --amber-50: #FAEEDA; --amber-200: #EF9F27; --amber-600: #854F0B;
  --green-50: #EAF3DE; --green-200: #97C459; --green-600: #3B6D11;
  --red-50: #FCEBEB; --red-200: #F09595; --red-600: #A32D2D;
  --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-200: #B4B2A9;
  --gray-400: #888780; --gray-600: #5F5E5A; --gray-800: #444441; --gray-900: #2C2C2A;
  --bg: #FAFAF8; --surface: #FFFFFF; --text: #1a1a18; --text-muted: #5F5E5A;
  --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
  --radius: 10px; --radius-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: inherit; text-decoration: none; }

/* NAV */
.nav { background: var(--surface); border-bottom: 0.5px solid var(--border-strong); padding: 0 2rem; display: flex; align-items: center; gap: 0; position: sticky; top: 0; z-index: 50; }
.nav-logo { display: flex; align-items: center; gap: 10px; font-family: 'Lora', serif; font-size: 18px; color: var(--purple-800); margin-right: 2rem; padding: 1rem 0; white-space: nowrap; }
.logo-img { height: 32px; width: auto; }
.nav-tabs { display: flex; gap: 0; flex: 1; }
.nav-tab { padding: 1rem 1.1rem; font-size: 14px; font-weight: 500; color: var(--text-muted); border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--purple-800); border-bottom-color: var(--purple-400); }

/* MAIN */
.main { max-width: 780px; margin: 0 auto; padding: 2rem 1.25rem; }
.page { display: none; }
.page.active { display: block; }

/* HERO */
.hero { text-align: center; padding: 2.5rem 1rem 2rem; background: var(--surface); border-radius: var(--radius-lg); border: 0.5px solid var(--border); margin-bottom: 1.75rem; }
.hero-badge { display: inline-block; background: var(--purple-50); color: var(--purple-900); font-size: 11px; font-weight: 700; padding: 4px 14px; border-radius: 20px; border: 1px solid var(--purple-200); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; }
.hero h1 { font-family: 'Lora', serif; font-size: 28px; color: var(--purple-900); margin-bottom: 0.5rem; }
.hero p { font-size: 14px; color: var(--text-muted); }

/* ROOT NAV */
.root-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.rnav-btn { padding: 7px 16px; border: 0.5px solid var(--border-strong); background: var(--surface); border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
.rnav-btn.active { background: var(--purple-50); border-color: var(--purple-200); color: var(--purple-800); }
.rnav-btn:hover:not(.active) { background: var(--gray-50); }

/* ROOT CARD */
.root-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
.root-header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.25rem; }
.root-chip { background: var(--purple-50); color: var(--purple-800); font-family: 'Lora', serif; font-size: 22px; font-weight: 600; padding: 10px 18px; border-radius: var(--radius); border: 1.5px solid var(--purple-200); min-width: 80px; text-align: center; }
.root-meta strong { font-size: 16px; font-weight: 700; color: var(--text); display: block; margin-bottom: 2px; }
.root-meta span { font-size: 12px; color: var(--text-muted); }
.words-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
.word-pill { background: var(--gray-50); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; cursor: pointer; transition: all 0.15s; }
.word-pill:hover { border-color: var(--purple-200); background: var(--purple-50); transform: translateY(-1px); }
.word-pill .wrd { font-size: 15px; font-weight: 600; color: var(--text); }
.word-pill .wph { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.empty-root { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 14px; }

/* POPUP */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
.overlay.show { display: flex; }
.popup { background: var(--surface); border-radius: var(--radius-lg); padding: 1.75rem; max-width: 400px; width: 100%; border: 0.5px solid var(--border-strong); animation: popIn 0.18s ease; }
@keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.popup-word { font-family: 'Lora', serif; font-size: 26px; font-weight: 600; color: var(--text); }
.popup-ph { font-size: 13px; color: var(--text-muted); margin: 4px 0 14px; }
.popup-parts { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.part { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
.part.prefix { background: var(--teal-50); color: var(--teal-800); border: 1px solid var(--teal-200); }
.part.root { background: var(--purple-50); color: var(--purple-900); border: 1px solid var(--purple-200); }
.part.suffix { background: var(--coral-50); color: var(--coral-800); border: 1px solid var(--coral-200); }
.popup-def { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.6; margin-bottom: 10px; }
.popup-ex { font-size: 13px; color: var(--text-muted); line-height: 1.65; border-left: 2.5px solid var(--purple-200); padding-left: 12px; margin-bottom: 1.25rem; font-style: italic; }
.popup-close { width: 100%; padding: 10px; background: var(--gray-50); border: 0.5px solid var(--border-strong); border-radius: var(--radius); cursor: pointer; font-size: 14px; color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif; }
.popup-close:hover { background: var(--gray-100); }

/* QUIZ */
.quiz-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem; }
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.quiz-title { font-size: 15px; font-weight: 700; }
.quiz-score-box { display: flex; align-items: baseline; gap: 4px; }
.score-val { font-size: 22px; font-weight: 700; color: var(--purple-800); }
.score-lbl { font-size: 12px; color: var(--text-muted); }
.quiz-word { font-family: 'Lora', serif; font-size: 28px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.quiz-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; }
.opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.opt { padding: 14px 12px; border: 0.5px solid var(--border-strong); background: var(--gray-50); border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text); text-align: left; font-family: 'Noto Sans TC', sans-serif; transition: all 0.12s; line-height: 1.4; }
.opt:hover:not(:disabled) { border-color: var(--purple-200); background: var(--purple-50); }
.opt.correct { background: var(--green-50) !important; border-color: var(--green-200) !important; color: var(--green-600) !important; }
.opt.wrong { background: var(--red-50) !important; border-color: var(--red-200) !important; color: var(--red-600) !important; }
.quiz-fb { min-height: 52px; font-size: 13px; color: var(--text-muted); line-height: 1.7; padding: 8px 0; }
.quiz-next { margin-top: 8px; padding: 10px 24px; background: var(--purple-50); border: 1px solid var(--purple-200); border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 700; color: var(--purple-800); font-family: 'Noto Sans TC', sans-serif; display: none; }
.quiz-next:hover { background: var(--purple-200); }
.quiz-empty { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 14px; }

/* CHALLENGE */
.ch-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem; }
.ch-num { font-size: 12px; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: 500; }
.ch-q { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; line-height: 1.5; }
.ch-hint { font-size: 13px; color: var(--text-muted); margin-bottom: 1.25rem; padding: 10px 14px; background: var(--amber-50); border-radius: var(--radius); border-left: 3px solid var(--amber-200); }
.ch-row { display: flex; gap: 10px; margin-bottom: 1rem; }
.ch-input { flex: 1; padding: 12px 14px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); font-size: 15px; font-family: 'Noto Sans TC', sans-serif; color: var(--text); background: var(--bg); }
.ch-input:focus { outline: none; border-color: var(--purple-400); background: var(--purple-50); }
.ch-btn { padding: 12px 20px; background: var(--purple-600); border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 700; color: #fff; font-family: 'Noto Sans TC', sans-serif; }
.ch-btn:hover { background: var(--purple-800); }
.ch-fb { font-size: 14px; padding: 10px 14px; border-radius: var(--radius); margin-bottom: 0.75rem; display: none; font-weight: 500; }
.ch-fb.ok { background: var(--green-50); color: var(--green-600); display: block; border: 0.5px solid var(--green-200); }
.ch-fb.err { background: var(--red-50); color: var(--red-600); display: block; border: 0.5px solid var(--red-200); }
.ch-next { width: 100%; padding: 10px; background: var(--gray-50); border: 0.5px solid var(--border-strong); border-radius: var(--radius); cursor: pointer; font-size: 14px; color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif; }
.ch-next:hover { background: var(--gray-100); }

/* ADMIN */
.admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
@media (max-width: 600px) { .admin-grid { grid-template-columns: 1fr; } }
.admin-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }
.admin-panel h2 { font-size: 16px; font-weight: 700; margin-bottom: 1.25rem; color: var(--text); display: flex; align-items: center; gap: 8px; }
.admin-panel h2 span { font-size: 20px; }
.field-label { font-size: 12px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; display: block; }
.field { margin-bottom: 1rem; }
input[type=text], textarea, select {
  width: 100%; padding: 10px 12px; border: 0.5px solid var(--border-strong); border-radius: var(--radius);
  font-size: 14px; font-family: 'Noto Sans TC', sans-serif; color: var(--text); background: var(--bg);
}
input[type=text]:focus, textarea:focus, select:focus { outline: none; border-color: var(--purple-400); background: var(--purple-50); }
textarea { resize: vertical; min-height: 80px; }
.btn-primary { width: 100%; padding: 11px; background: var(--purple-600); border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 700; color: #fff; font-family: 'Noto Sans TC', sans-serif; margin-top: 4px; }
.btn-primary:hover { background: var(--purple-800); }
.btn-danger { padding: 5px 12px; background: var(--red-50); border: 0.5px solid var(--red-200); border-radius: var(--radius); cursor: pointer; font-size: 12px; font-weight: 600; color: var(--red-600); font-family: 'Noto Sans TC', sans-serif; }
.btn-danger:hover { background: var(--red-200); }
.list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; background: var(--gray-50); }
.list-item-name { font-size: 14px; font-weight: 600; color: var(--text); }
.list-item-sub { font-size: 12px; color: var(--text-muted); }
.list-scroll { max-height: 320px; overflow-y: auto; }
.admin-full { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-top: 1.25rem; }
.parts-builder { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.part-input { display: flex; flex-direction: column; gap: 4px; }
.part-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
.tag-prefix { color: var(--teal-800); }
.tag-root { color: var(--purple-800); }
.tag-suffix { color: var(--coral-800); }
.toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--gray-900); color: #fff; padding: 12px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 500; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.25s; pointer-events: none; }
.toast.show { transform: translateY(0); opacity: 1; }
.progress-row { display: flex; gap: 1rem; margin-bottom: 1.75rem; }
.stat-box { flex: 1; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; text-align: center; }
.stat-num { font-size: 24px; font-weight: 700; color: var(--purple-800); display: block; }
.stat-lbl { font-size: 12px; color: var(--text-muted); }
.admin-sep { border: none; border-top: 0.5px solid var(--border); margin: 1rem 0; }
.no-items { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 13px; }
.word-list-item { padding: 8px 12px; border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; background: var(--gray-50); display: flex; justify-content: space-between; align-items: center; }
.word-list-item .winfo { flex: 1; }
.word-list-item .wname { font-size: 14px; font-weight: 600; }
.word-list-item .wdef { font-size: 12px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }

/* FOOTER */
.footer {
  text-align: center;
  padding: 1.5rem;
  font-size: 13px;
  color: var(--text-muted);
  border-top: 0.5px solid var(--border);
  margin-top: 3rem;
  background: var(--surface);
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">
    <img src="logo.png" alt="楠梓高中校徽" class="logo-img">
    <span>字根字彙</span>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab" onclick="goPage('admin')">⚙ 管理</div>
    <div class="nav-tab active" onclick="goPage('learn')">📖 學習字根</div>
    <div class="nav-tab" onclick="goPage('quiz')">🧠 小測驗</div>
    <div class="nav-tab" onclick="goPage('challenge')">✏️ 填字挑戰</div>
  </div>
</nav>

<div class="main">

<!-- LEARN -->
<div id="page-learn" class="page active">
  <div class="hero">
    <div class="hero-badge">高中英文字彙</div>
    <h1>字根字尾記憶法</h1>
    <p>拆解單字結構，一個字根學會一串單字</p>
  </div>
  <div class="root-nav" id="root-nav"></div>
  <div id="root-display"></div>
</div>

<!-- QUIZ -->
<div id="page-quiz" class="page">
  <div class="quiz-card" id="quiz-box">
    <div class="quiz-empty">請先在「管理」頁面新增至少 4 個單字，才能進行測驗。</div>
  </div>
</div>

<!-- CHALLENGE -->
<div id="page-challenge" class="page">
  <div class="ch-card" id="ch-box">
    <div class="quiz-empty">請先在「管理」頁面新增單字，才能進行填字挑戰。</div>
  </div>
</div>

<!-- ADMIN -->
<div id="page-admin" class="page">
  <div class="progress-row">
    <div class="stat-box"><span class="stat-num" id="stat-roots">0</span><span class="stat-lbl">字根數</span></div>
    <div class="stat-box"><span class="stat-num" id="stat-words">0</span><span class="stat-lbl">單字數</span></div>
    <div class="stat-box"><span class="stat-num" id="stat-ch">0</span><span class="stat-lbl">填字題數</span></div>
    <div class="stat-box" style="flex:0;min-width:100px;cursor:pointer;background:var(--red-50);border-color:var(--red-200);" onclick="resetAll()"><span class="stat-num" style="font-size:18px;color:var(--red-600)">↺</span><span class="stat-lbl" style="color:var(--red-600)">重置資料</span></div>
  </div>

  <div class="admin-grid">
    <!-- Add Root -->
    <div class="admin-panel">
      <h2><span>🌱</span> 新增字根</h2>
      <div class="field">
        <label class="field-label">字根（如 ex-）</label>
        <input type="text" id="r-root" placeholder="ex-">
      </div>
      <div class="field">
        <label class="field-label">中文意思</label>
        <input type="text" id="r-meaning" placeholder="向外、超越">
      </div>
      <div class="field">
        <label class="field-label">語源（可選）</label>
        <input type="text" id="r-origin" placeholder="拉丁文">
      </div>
      <button class="btn-primary" onclick="addRoot()">新增字根</button>
    </div>

    <!-- Root List -->
    <div class="admin-panel">
      <h2><span>📋</span> 現有字根</h2>
      <div class="list-scroll" id="root-list"></div>
    </div>
  </div>

  <!-- Add Word -->
  <div class="admin-full">
    <h2 style="font-size:16px;font-weight:700;margin-bottom:1.25rem;color:var(--text);display:flex;align-items:center;gap:8px;"><span>📝</span> 新增單字</h2>
    <div class="admin-grid">
      <div>
        <div class="field">
          <label class="field-label">選擇字根</label>
          <select id="w-root"></select>
        </div>
        <div class="field">
          <label class="field-label">英文單字</label>
          <input type="text" id="w-word" placeholder="export">
        </div>
        <div class="field">
          <label class="field-label">音標</label>
          <input type="text" id="w-ph" placeholder="/ɪkˈspɔːrt/">
        </div>
        <div class="field">
          <label class="field-label">中文解釋</label>
          <input type="text" id="w-def" placeholder="出口；輸出商品到其他國家">
        </div>
        <div class="field">
          <label class="field-label">例句（中英各一）</label>
          <textarea id="w-ex" placeholder="Taiwan exports many semiconductors. 台灣出口許多半導體。"></textarea>
        </div>
      </div>
      <div>
        <label class="field-label">字根拆解（字首／字根／字尾）</label>
        <div style="margin-bottom:0.75rem;font-size:12px;color:var(--text-muted)">每個方塊填一個部分，不用的留空</div>
        <div class="parts-builder" id="parts-builder">
          <div class="part-input"><span class="part-tag tag-prefix">字首 prefix</span><input type="text" id="p0" placeholder="ex-（向外）"></div>
          <div class="part-input"><span class="part-tag tag-root">字根 root</span><input type="text" id="p1" placeholder="port（搬運）"></div>
          <div class="part-input"><span class="part-tag tag-suffix">字尾 suffix</span><input type="text" id="p2" placeholder="-tion（名詞）"></div>
          <div class="part-input"><span class="part-tag tag-prefix">字首 prefix</span><input type="text" id="p3" placeholder=""></div>
          <div class="part-input"><span class="part-tag tag-root">字根 root</span><input type="text" id="p4" placeholder=""></div>
          <div class="part-input"><span class="part-tag tag-suffix">字尾 suffix</span><input type="text" id="p5" placeholder=""></div>
        </div>
        <div style="margin-top:1rem">
          <label class="field-label">預覽</label>
          <div id="parts-preview" style="display:flex;gap:6px;flex-wrap:wrap;min-height:34px;padding:8px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg)"></div>
        </div>
        <button class="btn-primary" style="margin-top:1rem" onclick="addWord()">新增單字</button>
      </div>
    </div>

    <hr class="admin-sep">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:0.75rem;">已新增的單字</h3>
    <div class="list-scroll" id="word-list"></div>
  </div>

  <!-- Add Challenge -->
  <div class="admin-full" style="margin-top:1.25rem">
    <h2 style="font-size:16px;font-weight:700;margin-bottom:1.25rem;color:var(--text);display:flex;align-items:center;gap:8px;"><span>✏️</span> 新增填字題</h2>
    <div class="admin-grid">
      <div>
        <div class="field">
          <label class="field-label">題目描述</label>
          <textarea id="ch-q" placeholder="字根 'ex-' 代表「向外」，那麼 ex___t 表示「輸出」，完整單字是？"></textarea>
        </div>
        <div class="field">
          <label class="field-label">提示</label>
          <input type="text" id="ch-hint-in" placeholder="ex + port（搬運）">

// ── STATE ────────────────────────────────────────────────────────────────────
function load() {
  const r = localStorage.getItem('vr_roots');
  const w = localStorage.getItem('vr_words');
  const c = localStorage.getItem('vr_ch');
  return {
    roots: r ? JSON.parse(r) : JSON.parse(JSON.stringify(DEFAULT_ROOTS)),
    words: w ? JSON.parse(w) : JSON.parse(JSON.stringify(DEFAULT_WORDS)),
    challenges: c ? JSON.parse(c) : JSON.parse(JSON.stringify(DEFAULT_CHALLENGES)),
  };
}
function save() {
  localStorage.setItem('vr_roots', JSON.stringify(STATE.roots));
  localStorage.setItem('vr_words', JSON.stringify(STATE.words));
  localStorage.setItem('vr_ch', JSON.stringify(STATE.challenges));
}
let STATE = load();
let curRoot = 0, qIdx = 0, qScore = 0, qAnswered = false, chIdx = 0;

function resetAll() {
  if(!confirm('確定要重置所有資料為預設值嗎？這將會清除您新增的所有字根與單字。')) return;
  localStorage.removeItem('vr_roots');
  localStorage.removeItem('vr_words');
  localStorage.removeItem('vr_ch');
  STATE = load();
  curRoot = 0;
  qIdx = 0;
  qScore = 0;
  qAnswered = false;
  chIdx = 0;
  if(document.getElementById('page-admin').classList.contains('active')) {
    renderAdmin();
  } else {
    goPage('learn');
  }
  toast('🔄 所有資料已重置為預設值');
}

// ── NAV ──────────────────────────────────────────────────────────────────────
function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  const idx = ['admin','learn','quiz','challenge'].indexOf(id);
  if(idx >= 0) document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  if(id==='learn') renderLearn();
  if(id==='quiz') renderQuiz();
  if(id==='challenge') renderChallenge();
  if(id==='admin') renderAdmin();
}

// ── LEARN ────────────────────────────────────────────────────────────────────
function renderLearn() {
  const nav = document.getElementById('root-nav');
  nav.innerHTML = STATE.roots.map((r,i) => `<button class="rnav-btn${i===curRoot?' active':''}" onclick="showRoot(${i})">${r.root}</button>`).join('');
  showRoot(curRoot);
}
function showRoot(i) {
  curRoot = i;
  document.querySelectorAll('.rnav-btn').forEach((b,j) => b.classList.toggle('active', j===i));
  const r = STATE.roots[i];
  const words = STATE.words.filter(w => w.rootId === r.id);
  document.getElementById('root-display').innerHTML = `
    <div class="root-card">
      <div class="root-header">
        <div class="root-chip">${r.root}</div>
        <div class="root-meta"><strong>${r.meaning}</strong><span>語源：${r.origin||'—'}</span></div>
      </div>
      ${words.length === 0
        ? '<div class="empty-root">此字根尚無單字，請至「管理」頁面新增。</div>'
        : `<div class="words-grid">${words.map((w,wi) => `
          <div class="word-pill" onclick="showPopup('${w.id}')">
            <div class="wrd">${w.word}</div>
            <div class="wph">${w.ph||''}</div>
          </div>`).join('')}</div>`
      }
    </div>
    <p style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:8px">點擊單字卡查看詳細解析</p>
  `;
}
function showPopup(wid) {
  const w = STATE.words.find(x => x.id === wid);
  if(!w) return;
  document.getElementById('pw').textContent = w.word;
  document.getElementById('pph').textContent = w.ph||'';
  document.getElementById('pbd').innerHTML = (w.parts||[]).map(p => `<span class="part ${p.t}">${p.l}</span>`).join('');
  document.getElementById('pdef').textContent = w.def;
  document.getElementById('pex').textContent = w.ex||'';
  document.getElementById('popup').classList.add('show');
}
function closePopup() { document.getElementById('popup').classList.remove('show'); }

// ── QUIZ ─────────────────────────────────────────────────────────────────────
function renderQuiz() {
  const box = document.getElementById('quiz-box');
  if(STATE.words.length < 4) {
    box.innerHTML = '<div class="quiz-empty">請先在「管理」頁面新增至少 4 個單字，才能進行測驗。</div>';
    return;
  }
  const w = STATE.words[qIdx % STATE.words.length];
  const r = STATE.roots.find(x => x.id === w.rootId);
  const correct = w.def;
  const wrongs = STATE.words.filter(x => x.def !== correct).sort(() => Math.random()-0.5).slice(0,3).map(x=>x.def);
  const opts = [correct, ...wrongs].sort(() => Math.random()-0.5);
  box.innerHTML = `
    <div class="quiz-header">
      <div class="quiz-title">猜猜這個單字的意思</div>
      <div class="quiz-score-box"><span class="score-val" id="qscore">${qScore}</span><span class="score-lbl">分</span></div>
    </div>
    <div class="quiz-word">${w.word}</div>
    <div class="quiz-sub">${w.ph||''} ${r ? `・字根：${r.root}（${r.meaning}）` : ''}</div>
    <div class="opts" id="q-opts">
      ${opts.map((o,i) => `<button class="opt" id="opt${i}" onclick="answerQuiz(${i},'${encodeURIComponent(o)}','${encodeURIComponent(correct)}')">${o}</button>`).join('')}
    </div>
    <div class="quiz-fb" id="q-fb"></div>
    <button class="quiz-next" id="q-next" onclick="nextQ()">下一題 →</button>
  `;
  qAnswered = false;
}
function answerQuiz(idx, chosenEnc, correctEnc) {
  if(qAnswered) return;
  qAnswered = true;
  const chosen = decodeURIComponent(chosenEnc);
  const correct = decodeURIComponent(correctEnc);
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);
  const w = STATE.words[qIdx % STATE.words.length];
  if(chosen === correct) {
    btns[idx].classList.add('correct');
    qScore++;
    document.getElementById('qscore').textContent = qScore;
    document.getElementById('q-fb').innerHTML = `<span style="color:var(--green-600);font-weight:700">✓ 正確！</span> ${w.ex||''}`;
  } else {
    btns[idx].classList.add('wrong');
    btns.forEach(b => { if(b.textContent === correct) b.classList.add('correct'); });
    document.getElementById('q-fb').innerHTML = `<span style="color:var(--red-600);font-weight:700">✗ 再想想！</span> 正確答案：${correct}`;
  }
  document.getElementById('q-next').style.display = 'block';
}
function nextQ() { qIdx++; renderQuiz(); }

// ── CHALLENGE ────────────────────────────────────────────────────────────────
function renderChallenge() {
  const box = document.getElementById('ch-box');
  if(STATE.challenges.length === 0) {
    box.innerHTML = '<div class="quiz-empty">請先在「管理」頁面新增填字題。</div>';
    return;
  }
  const ch = STATE.challenges[chIdx % STATE.challenges.length];
  box.innerHTML = `
    <div class="ch-num">第 ${(chIdx % STATE.challenges.length)+1} / ${STATE.challenges.length} 題</div>
    <div class="ch-q">${ch.prompt}</div>
    <div class="ch-hint">💡 提示：${ch.hint}</div>
    <div class="ch-row">
      <input class="ch-input" id="ch-inp" placeholder="輸入答案…" onkeydown="if(event.key==='Enter')checkCh()">
      <button class="ch-btn" onclick="checkCh()">確認</button>
    </div>
    <div class="ch-fb" id="ch-fb"></div>
    <button class="ch-next" onclick="nextCh()">換一題 →</button>
  `;
  setTimeout(() => document.getElementById('ch-inp')&&document.getElementById('ch-inp').focus(), 80);
}
function checkCh() {
  const ch = STATE.challenges[chIdx % STATE.challenges.length];
  const val = (document.getElementById('ch-inp').value||'').trim().toLowerCase();
  const ans = ch.answer.toLowerCase();
  const fb = document.getElementById('ch-fb');
  if(val === ans) {
    fb.className = 'ch-fb ok'; fb.textContent = '🎉 答對了！答案是：' + ch.full;
  } else {
    fb.className = 'ch-fb err'; fb.textContent = '再試試看！提示：' + ch.hint;
  }
}
function nextCh() { chIdx++; renderChallenge(); }

// ── ADMIN ────────────────────────────────────────────────────────────────────
function renderAdmin() {
  document.getElementById('stat-roots').textContent = STATE.roots.length;
  document.getElementById('stat-words').textContent = STATE.words.length;
  document.getElementById('stat-ch').textContent = STATE.challenges.length;
  // root list
  const rl = document.getElementById('root-list');
  rl.innerHTML = STATE.roots.length ? STATE.roots.map(r => `
    <div class="list-item">
      <div><div class="list-item-name">${r.root}</div><div class="list-item-sub">${r.meaning} · ${r.words||0} 個單字</div></div>
      <button class="btn-danger" onclick="deleteRoot('${r.id}')">刪除</button>
    </div>`).join('') : '<div class="no-items">尚無字根</div>';
  // word select
  const ws = document.getElementById('w-root');
  ws.innerHTML = STATE.roots.map(r => `<option value="${r.id}">${r.root} （${r.meaning}）</option>`).join('');
  // word list
  const wl = document.getElementById('word-list');
  wl.innerHTML = STATE.words.length ? STATE.words.map(w => {
    const r = STATE.roots.find(x=>x.id===w.rootId);
    return `<div class="word-list-item"><div class="winfo"><div class="wname">${w.word} <span style="font-size:11px;color:var(--text-muted)">${w.ph||''}</span></div><div class="wdef">${w.def}</div></div><button class="btn-danger" onclick="deleteWord('${w.id}')">刪除</button></div>`;
  }).join('') : '<div class="no-items">尚無單字</div>';
  // challenge list
  const cl = document.getElementById('ch-list');
  cl.innerHTML = STATE.challenges.length ? STATE.challenges.map(c => `
    <div class="list-item"><div><div class="list-item-name" style="font-size:13px">${c.prompt.slice(0,32)}…</div><div class="list-item-sub">答案：${c.answer}</div></div><button class="btn-danger" onclick="deleteCh('${c.id}')">刪除</button></div>`).join('') : '<div class="no-items">尚無填字題</div>';
  // parts preview live bind
  ['p0','p1','p2','p3','p4','p5'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.oninput = updatePartsPreview;
  });
  updatePartsPreview();
}
function updatePartsPreview() {
  const types = ['prefix','root','suffix','prefix','root','suffix'];
  const parts = ['p0','p1','p2','p3','p4','p5'].map((id,i) => ({t:types[i], l:(document.getElementById(id)||{}).value||''})).filter(p=>p.l);
  document.getElementById('parts-preview').innerHTML = parts.map(p=>`<span class="part ${p.t}">${p.l}</span>`).join('');
}
function addRoot() {
  const root = document.getElementById('r-root').value.trim();
  const meaning = document.getElementById('r-meaning').value.trim();
  const origin = document.getElementById('r-origin').value.trim();
  if(!root || !meaning) { toast('請填寫字根和中文意思'); return; }
  const id = 'r' + Date.now();
  STATE.roots.push({ id, root, meaning, origin });
  save(); renderAdmin();
  document.getElementById('r-root').value='';
  document.getElementById('r-meaning').value='';
  document.getElementById('r-origin').value='';
  toast('✅ 字根「' + root + '」已新增！');
}
function deleteRoot(id) {
  if(!confirm('確定刪除此字根？相關單字也會一起刪除。')) return;
  STATE.roots = STATE.roots.filter(r=>r.id!==id);
  STATE.words = STATE.words.filter(w=>w.rootId!==id);
  save(); renderAdmin(); toast('字根已刪除');
}
function addWord() {
  const rootId = document.getElementById('w-root').value;
  const word = document.getElementById('w-word').value.trim();
  const ph = document.getElementById('w-ph').value.trim();
  const def = document.getElementById('w-def').value.trim();
  const ex = document.getElementById('w-ex').value.trim();
  if(!rootId || !word || !def) { toast('請填寫單字和中文解釋'); return; }
  const types = ['prefix','root','suffix','prefix','root','suffix'];
  const parts = ['p0','p1','p2','p3','p4','p5'].map((id,i) => ({t:types[i], l:document.getElementById(id).value.trim()})).filter(p=>p.l);
  const id = 'w' + Date.now();
  STATE.words.push({ id, rootId, word, ph, parts, def, ex });
  save(); renderAdmin();
  ['w-word','w-ph','w-def','w-ex','p0','p1','p2','p3','p4','p5'].forEach(i => document.getElementById(i).value='');
  updatePartsPreview();
  toast('✅ 單字「' + word + '」已新增！');
}
function deleteWord(id) {
  STATE.words = STATE.words.filter(w=>w.id!==id);
  save(); renderAdmin(); toast('單字已刪除');
}
function addChallenge() {
  const prompt = document.getElementById('ch-q').value.trim();
  const hint = document.getElementById('ch-hint-in').value.trim();
  const answer = document.getElementById('ch-ans').value.trim();
  const full = document.getElementById('ch-full').value.trim() || answer;
  if(!prompt || !answer) { toast('請填寫題目和答案'); return; }
  STATE.challenges.push({ id:'c'+Date.now(), prompt, hint, answer, full });
  save(); renderAdmin();
  ['ch-q','ch-hint-in','ch-ans','ch-full'].forEach(i => document.getElementById(i).value='');
  toast('✅ 填字題已新增！');
}
function deleteCh(id) {
  STATE.challenges = STATE.challenges.filter(c=>c.id!==id);
  save(); renderAdmin(); toast('題目已刪除');
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
renderLearn();
</script>

  <div>201楊蕓妃</div>
